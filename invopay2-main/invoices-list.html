<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoPay | قائمة الفواتير</title>

    <link rel="stylesheet" href="invoices-list.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">Invo<span>Pay</span></div>

        <nav class="side-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="invoices-list.html" class="active"><i class="fas fa-file-invoice"></i> فواتيري</a>
            <a href="create-invoice.html"><i class="fas fa-plus-circle"></i> إنشاء فاتورة</a>
            <a href="customers.html"><i class="fas fa-users"></i> العملاء</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="invoices-header">
            <a href="create-invoice.html" class="btn-new-invoice">
                <i class="fas fa-plus"></i> فاتورة جديدة
            </a>

            <div class="header-text">
                <h1>قائمة الفواتير</h1>
                <p>إدارة ومتابعة جميع الفواتير الصادرة</p>
            </div>
        </header>

        <!-- SEARCH -->
        <section class="gray-layout-box">

            <form method="GET" action="">
                <div class="search-filter-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input 
                            type="text" 
                            name="search" 
                            placeholder="ابحث برقم الفاتورة أو اسم العميل..."
                        >
                    </div>
                </div>
            </form>

            <!-- TABLE -->
            <div class="white-table-card">

                <table class="main-data-table">
                    <thead>
                        <tr>
                            <th>رقم الفاتورة</th>
                            <th>العميل</th>
                            <th>التاريخ</th>
                            <th>المبلغ الإجمالي</th>
                            <th>الحالة</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!-- ROW 1 -->
                        <tr>
                            <td>INV-001#</td>
                            <td>شركة الأمل للتوريدات</td>
                            <td>2024/03/10</td>
                            <td>2,000 ج.م</td>
                            <td>
                                <span class="badge-status paid">مدفوعة</span>
                            </td>

                            <td class="actions-cell">

                                <!-- VIEW -->
                                <a href="view-invoice.html?id=1">
                                    <i class="fas fa-eye view" title="عرض"></i>
                                </a>

                                <!-- EDIT -->
                                <a href="edit-invoice.html?id=1">
                                    <i class="fas fa-edit edit" title="تعديل"></i>
                                </a>

                                <!-- DELETE -->
                                <form method="POST" action="" style="display:inline;">
                                    <input type="hidden" name="invoice_id" value="1">
                                    <button type="submit" name="delete" style="background:none;border:none;">
                                        <i class="fas fa-trash delete" title="حذف"></i>
                                    </button>
                                </form>

                            </td>
                        </tr>

                        <!-- ROW 2 -->
                        <tr>
                            <td>INV-002#</td>
                            <td>معرض التقوى للأثاث</td>
                            <td>2024/03/12</td>
                            <td>1,500 ج.م</td>
                            <td>
                                <span class="badge-status pending">معلقة</span>
                            </td>

                            <td class="actions-cell">

                                <a href="view-invoice.html?id=2">
                                    <i class="fas fa-eye view"></i>
                                </a>

                                <a href="edit-invoice.html?id=2">
                                    <i class="fas fa-edit edit"></i>
                                </a>

                                <form method="POST" action="" style="display:inline;">
                                    <input type="hidden" name="invoice_id" value="2">
                                    <button type="submit" name="delete" style="background:none;border:none;">
                                        <i class="fas fa-trash delete"></i>
                                    </button>
                                </form>

                            </td>
                        </tr>

                    </tbody>
                </table>

            </div>

        </section>

    </main>

</div>

</body>
</html>
