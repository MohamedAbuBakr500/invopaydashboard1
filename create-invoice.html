<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoPay - إنشاء فاتورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="create-invoice.css">
</head>
<body>

    <div class="app-container">
        <header class="dark-card">
            <div class="logo-bar">
                <div class="logo">invo<span>Pay</span></div>
                <a href="dashboard.html">
                    <button class="btn-outline">العودة للوحة التحكم</button>
                </a>
            </div>
            
            <h2 class="title">نموذج فاتورة جديدة</h2>

            <div class="customer-fields">
                <p class="section-subtitle">👤 بيانات العميل</p>
                <div class="inputs-row">
                    <div class="input-box">
                        <label>اسم العميل</label>
                        <input type="text">
                    </div>
                    <div class="input-box">
                        <label>العنوان</label>
                        <input type="text">
                    </div>
                    <div class="input-box">
                        <label>البريد الإلكتروني</label>
                        <input type="email">
                    </div>
                    <div class="input-box">
                        <label>تاريخ الفاتورة</label>
                                               <input type="text" placeholder=" يوم/شهر/سنه" class="manual-date" required>            

                            </div>
                </div>
            </div>
        </header>

        <main class="light-content">
            <h3 class="table-title">📋 المنتجات والخدمات</h3>
            <div class="table-container">

<div class="invoice-table">

    <div class="table-header">
        <div>الوصف</div>
        <div>الكمية</div>
        <div>سعر الوحدة</div>
        <div>الإجمالي</div>
    </div>

    <!-- الفورم هنا (بره كل العناصر) -->
    <form action="" method="post">

        <div id="items-container">

            <div class="table-row">
                <input type="text" name="item_name[]" placeholder="اسم الخدمة">
                <input type="number" name="qty[]" class="qty" value="1">
                <input type="number" name="price[]" class="price" placeholder="0.00">
                <div class="row-total">0.00 ج.م</div>
            </div>

        </div>

        <button type="button" class="add-btn" onclick="addRow()">+ إضافة بند جديد</button>

        <div class="invoice-footer">

            <div class="calculation-box">

                <p>الإجمالي الفرعي:
                    <span id="subtotal">0.00 ج.م</span>
                </p>

                <p>
                    الضريبة (%):
                    <input type="number" name="tax" id="taxInput" value="14">
                </p>

                <p>قيمة الضريبة:
                    <span id="taxAmount">0.00 ج.م</span>
                </p>

                <p class="final-total">
                    الإجمالي الكلي:
                    <span id="total">0.00 ج.م</span>
                </p>

            </div>

            <!-- زرار submit -->
            <button type="submit" class="save-print-btn">
                حفظ و طباعة الفاتورة
            </button>

        </div>

    </form>

</div>

</body>
</html>
